title: "[Q&A] "
labels: ["discussion"]
body:
  - type: textarea
    id: question
    attributes:
      label: What are you trying to do?
      description: One paragraph is usually enough.
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: What have you tried?
      description: Code snippet, config, links to docs you already read.
      render: go
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: theauth-go version
      placeholder: v2.4.0
