name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  test:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: theauth
          POSTGRES_PASSWORD: theauth
          POSTGRES_DB: theauth_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U theauth"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      # Deliberately unused by any test today: THEAUTH_MYSQL_CONTRACT is not
      # set below, so TestMySQLStoreContract still skips. This container
      # exists so the opt-in gate can be flipped on once MySQL's status
      # against the shared contract suite is verified (see ROADMAP.md).
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: theauth
          MYSQL_DATABASE: theauth_test
        ports: ["3306:3306"]
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go vet ./...
      - run: go test -race -timeout=120s -coverprofile=coverage.out ./...
        env:
          POSTGRES_TEST_URL: postgres://theauth:theauth@localhost:5432/theauth_test?sslmode=disable
      - uses: codecov/codecov-action@v7
        with:
          files: coverage.out
          fail_ci_if_error: false
      - run: go test -bench=. -benchmem -run=^$ -benchtime=1x ./internal/bench/...

  fuzz:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { pkg: ./crypto, name: FuzzEncryptDecrypt }
          - { pkg: ./crypto, name: FuzzDecryptArbitrary }
          - { pkg: ./crypto, name: FuzzVerifierToChallenge }
          - { pkg: ./crypto, name: FuzzGenerateCodeVerifier }
          - { pkg: ./crypto, name: FuzzTokenHashRoundTrip }
          - { pkg: ./crypto, name: FuzzBase64URLDecode }
          - { pkg: ".", name: FuzzParseSessionCookie }
          - { pkg: ".", name: FuzzParseStateCookie }
          - { pkg: ".", name: FuzzEmailValidation }
          - { pkg: ".", name: FuzzCallbackQueryParams }
          - { pkg: ".", name: FuzzCallbackProviderName }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Fuzz ${{ matrix.target.name }}
        run: go test -run=^$ -fuzz=^${{ matrix.target.name }}$ -fuzztime=10s ${{ matrix.target.pkg }}

  lint:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git fetch origin main:refs/remotes/origin/main
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: --timeout=3m --new-from-rev=origin/main
