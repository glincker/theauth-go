name: bench

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same ref so a fast-follow push does not
# queue up two benchmark jobs that race on the cache key.
concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bench:
    name: Performance regression gate
    runs-on: ubuntu-latest

    env:
      THRESHOLD_PCT: 25
      BENCH_TIME: 2s
      BENCH_COUNT: 10
      # BENCH_PIN is intentionally unset by default; GitHub Actions ubuntu
      # runners support taskset but pinning to core 0 can conflict with the
      # runner's own housekeeping work. Enable by setting BENCH_PIN: "1" in
      # repo/environment secrets if you observe high variance.

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          # fetch-depth 0 ensures the base ref is reachable for checkout below.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      # Try to restore a cached baseline for the base commit. On a PR the base
      # commit is github.event.pull_request.base.sha; on a push to main it is
      # the commit before the push (github.event.before). Both are pinned so
      # the cache is stable across PR re-runs.
      - name: Restore base benchmark cache
        id: cache-base
        uses: actions/cache@v4
        with:
          path: base-bench.txt
          key: bench-baseline-${{ github.event.pull_request.base.sha || github.event.before }}

      # Save a copy of the gate script and curated list to /tmp before any
      # git checkout so we can run them on the base commit (which does not
      # have scripts/ or benchgate/ yet).
      - name: Stash gate script and curated list for base run
        if: steps.cache-base.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/benchgate
          cp scripts/bench-gate.sh /tmp/bench-gate.sh
          cp benchgate/curated.txt /tmp/benchgate/curated.txt
          chmod +x /tmp/bench-gate.sh

      # Run benchmarks on the current (PR) branch first, in parallel with the
      # base run below when the cache is cold.
      - name: Run benchmarks on PR branch
        run: ./scripts/bench-gate.sh > pr-bench.txt
        env:
          BENCH_TIME: ${{ env.BENCH_TIME }}
          BENCH_COUNT: ${{ env.BENCH_COUNT }}

      # Run benchmarks on the base branch only when the cache was not hit.
      - name: Checkout base branch
        if: steps.cache-base.outputs.cache-hit != 'true'
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "${BASE_SHA}" ] || [ "${BASE_SHA}" = "0000000000000000000000000000000000000000" ]; then
            echo "No base SHA available (first push to branch); skipping base run."
            echo "SKIP_DIFF=true" >> "$GITHUB_ENV"
          else
            git checkout "${BASE_SHA}"
          fi

      - name: Run benchmarks on base commit
        if: steps.cache-base.outputs.cache-hit != 'true' && env.SKIP_DIFF != 'true'
        # Use the stashed copy of the script so missing scripts/ on the
        # base commit is not a problem. BENCH_ROOT points to the curated.txt
        # on the PR branch (stashed in /tmp alongside the script). Benchmarks
        # that do not exist on the base commit are silently skipped by go test
        # (no matching -bench pattern).
        # BENCH_ROOT=/tmp so the script finds /tmp/benchgate/curated.txt.
        run: BENCH_ROOT="/tmp" /tmp/bench-gate.sh > base-bench.txt
        env:
          BENCH_TIME: ${{ env.BENCH_TIME }}
          BENCH_COUNT: ${{ env.BENCH_COUNT }}

      - name: Save base benchmark to cache
        if: steps.cache-base.outputs.cache-hit != 'true' && env.SKIP_DIFF != 'true'
        uses: actions/cache/save@v4
        with:
          path: base-bench.txt
          key: bench-baseline-${{ github.event.pull_request.base.sha || github.event.before }}

      # Return to the PR branch before running the diff step (git checkout
      # above moves HEAD).
      - name: Restore PR branch
        if: steps.cache-base.outputs.cache-hit != 'true' && env.SKIP_DIFF != 'true'
        run: git checkout ${{ github.sha }}

      - name: Run benchstat diff
        if: env.SKIP_DIFF != 'true'
        id: benchstat
        run: |
          benchstat base-bench.txt pr-bench.txt | tee diff.txt
          echo "diff_output<<BENCHEOF" >> "$GITHUB_OUTPUT"
          cat diff.txt >> "$GITHUB_OUTPUT"
          echo "BENCHEOF" >> "$GITHUB_OUTPUT"

      - name: Comment benchstat diff on PR
        if: github.event_name == 'pull_request' && env.SKIP_DIFF != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const diff = `${{ steps.benchstat.outputs.diff_output }}`;
            const threshold = process.env.THRESHOLD_PCT;
            const body = [
              '## Benchmark regression report',
              '',
              'Threshold: **' + threshold + '%**',
              '',
              '```',
              diff,
              '```',
              '',
              '_Generated by the bench workflow. A `+` delta means the PR branch is slower._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.startsWith('## Benchmark regression report')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
        env:
          THRESHOLD_PCT: ${{ env.THRESHOLD_PCT }}

      - name: Check for regressions
        if: env.SKIP_DIFF != 'true'
        run: ./scripts/bench-gate.sh --check diff.txt
        env:
          THRESHOLD_PCT: ${{ env.THRESHOLD_PCT }}

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results-${{ github.sha }}
          path: |
            pr-bench.txt
            base-bench.txt
            diff.txt
          if-no-files-found: ignore
          retention-days: 90
