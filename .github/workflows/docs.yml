name: docs

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs-site/requirements.txt

      - name: Install docs dependencies
        run: pip install -r docs-site/requirements.txt

      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Derive version info
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME}"
            ALIAS=""
          else
            VERSION="latest"
            ALIAS="latest"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "alias=${ALIAS}" >> "$GITHUB_OUTPUT"

      - name: Deploy versioned docs (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: docs-site
        run: |
          mike deploy "${{ steps.version.outputs.version }}" --push
          mike set-default latest --push

      - name: Deploy latest docs (main push)
        if: github.ref == 'refs/heads/main'
        working-directory: docs-site
        run: |
          mike deploy latest --update-aliases --push
          mike set-default latest --push
