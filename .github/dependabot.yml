version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels: ["type/chore", "area/ci"]
    commit-message:
      prefix: "chore"

  - package-ecosystem: "gomod"
    directory: "/mcpresource"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["type/chore", "area/ci"]
    commit-message:
      prefix: "chore"

  - package-ecosystem: "gomod"
    directory: "/audit/sinks/otlp"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["type/chore", "area/ci"]
    commit-message:
      prefix: "chore"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels: ["type/chore", "area/ci"]
    commit-message:
      prefix: "ci"
