site_name: theauth-go
site_description: Go auth library covering OAuth 2.1, MCP authorization, agent identities, WebAuthn, SAML, SCIM, and more.
site_url: https://theauth.dev/go/
repo_url: https://github.com/glincker/theauth-go
repo_name: glincker/theauth-go
edit_uri: edit/main/docs-site/docs/

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mike:
      alias_type: symlink
      canonical_version: latest

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.snippets:
      base_path: ..
  - admonition
  - tables
  - toc:
      permalink: true

extra:
  version:
    provider: mike
    default: latest

nav:
  - Home: index.md
  - Getting Started:
      - Overview: getting-started/overview.md
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quick-start.md
      - Storage Backends: getting-started/storage-backends.md
      - Example Apps: getting-started/example-apps.md
  - Concepts:
      - OAuth 2.1 Primer: concepts/oauth21-primer.md
      - MCP Authorization: concepts/mcp-authorization.md
      - Authorization Server: concepts/authorization-server.md
      - Resource Server (mcpresource): concepts/resource-server.md
      - PAR + JAR (FAPI 2.0): concepts/par-jar.md
      - JWT-Bearer Client Auth: concepts/jwt-bearer.md
      - CIBA Backchannel Auth: concepts/ciba.md
  - Guides:
      - Add an OAuth Provider: guides/add-oauth-provider.md
      - Enable WebAuthn Passkeys: guides/webauthn-passkeys.md
      - Wire OpenTelemetry Tracing: guides/opentelemetry-tracing.md
      - Stream Audit Logs to Splunk: guides/audit-log-splunk.md
      - Write a Custom Storage Backend: guides/custom-storage-backend.md
      - Migrate from Cognito: guides/migrate-from-cognito.md
      - Migrate from Auth0: guides/migrate-from-auth0.md
  - Reference:
      - Configuration: reference/configuration.md
      - Storage Interface: reference/storage.md
      - Errors: reference/errors.md
      - Metrics: reference/metrics.md
      - Spans: reference/spans.md
      - Audit Events: reference/audit-events.md
  - Security:
      - Threat Model: security/threat-model.md
      - Releases and Verification: security/releases.md
      - Benchmarks: security/benchmarks.md
      - SOC 2 Mapping: security/compliance-soc2.md
      - GDPR Reference: security/compliance-gdpr.md
  - Migrations:
      - v2.3 to v2.4: migrations/v2.3-to-v2.4.md
      - v2.0 to v2.1: migrations/v2.0-to-v2.1.md
      - v1.0 to v2.0: migrations/v1.0-to-v2.0.md
      - v0.7 to v1.0: migrations/v0.7-to-v1.0.md
  - Changelog: changelog.md
